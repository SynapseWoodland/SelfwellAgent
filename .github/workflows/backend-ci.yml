name: backend-ci

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "pyproject.toml"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "pyproject.toml"
      - ".github/workflows/backend-ci.yml"

jobs:
  quality-gates:
    name: L0-L4 质量门禁
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --all-extras

      # ──────────────────────────────────────────────
      # L0：ruff lint
      # ──────────────────────────────────────────────
      - name: L0 — ruff lint
        run: uv run ruff check backend/

      # ──────────────────────────────────────────────
      # L1：ruff format 检查
      # ──────────────────────────────────────────────
      - name: L1 — ruff format check
        run: uv run ruff format --check backend/

      # ──────────────────────────────────────────────
      # L2：mypy strict
      # ──────────────────────────────────────────────
      - name: L2 — mypy strict
        run: uv run mypy backend/ --strict --ignore-missing-imports

      # ──────────────────────────────────────────────
      # L3：pytest（含 Golden Set / Eval Runner）
      # ──────────────────────────────────────────────
      - name: L3 — pytest
        run: |
          uv run pytest backend/tests/ -v \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60

      # ──────────────────────────────────────────────
      # L4a：ruff 安全规则选择器（必跑，对齐 l0-l6-gates.mdc L4a）
      # ──────────────────────────────────────────────
      - name: L4a — ruff 安全规则
        run: uv run ruff check backend/ --select=F401,F811,S608,S307,SEC,B,B003

      # ──────────────────────────────────────────────
      # L4b：jscpd 代码重复检查（≤ 4%，对齐 l0-l6-gates.mdc L4b）
      # ──────────────────────────────────────────────
      - name: L4b — jscpd
        run: uv run jscpd backend/ --threshold 4 --reporters console --output /tmp/jscpd

      # ──────────────────────────────────────────────
      # L5：架构 & 安全 grep 12 条（CI 硬卡，对齐 l0-l6-gates.mdc §5.2）
      # AI 审查先跑 + CI 兜底防漏（一人模式无人可托）
      # ──────────────────────────────────────────────
      - name: L5 — 架构 & 安全 grep 12 条
        run: |
          FAIL=0
          cd "$GITHUB_WORKSPACE"

          # 1. 禁止从 loguru 直接 import（仅 backend/app/core/log.py 豁免）
          if grep -rn "from loguru import logger" backend/app/ | grep -v "backend/app/core/log.py"; then
            echo "::error::L5-1 失败：从 loguru 直接 import（仅 backend/app/core/log.py 豁免）"; FAIL=1
          fi

          # 2. 禁止 stdlib logging 绕开管道
          if grep -rn "logging\.getLogger\|logging\.basicConfig" backend/app/ | grep -v "backend/app/core/log.py"; then
            echo "::error::L5-2 失败：stdlib logging 绕开管道"; FAIL=1
          fi

          # 3. PII 字段明文进日志
          if grep -rnE "\.(password|email|phone|card_number|diagnosis)\s*=" backend/app/ \
               | grep -v "REDACTED" | grep -v "tests/"; then
            echo "::error::L5-3 失败：PII 字段明文进日志"; FAIL=1
          fi

          # 4. 吞 traceback 反模式
          if grep -rnE "except Exception.*logger\.warning\(\s*(str\(|e)" backend/app/; then
            echo "::error::L5-4 失败：except + logger.warning(str(e)) 反模式"; FAIL=1
          fi

          # 5. 裸 except
          if grep -rn "except:" backend/app/; then
            echo "::error::L5-5 失败：裸 except"; FAIL=1
          fi

          # 6. print() 残留
          if grep -rn "print(" backend/app/ | grep -v "tests/"; then
            echo "::error::L5-6 失败：print() 残留"; FAIL=1
          fi

          # 7. 调试代码残留（TODO/FIXME 可允许）
          if grep -rn "pdb.set_trace\|breakpoint()" backend/app/; then
            echo "::error::L5-7 失败：调试代码残留"; FAIL=1
          fi

          # 8. LLM 参数硬编码（temperature）- error
          if grep -rn "temperature=" backend/app/ | grep -v "tests/" | grep -v "# " | grep -v "app_config\|llm_config"; then
            echo "::error::L5-8 失败：temperature 硬编码（必须从 app_config.llm 读取）"; FAIL=1
          fi

          # 9. LLM 参数硬编码（model）- error
          if grep -rn "model=" backend/app/ | grep -v "tests/" | grep -v "# " | grep -v "app_config\|llm_config"; then
            echo "::error::L5-9 失败：model 硬编码（必须从 app_config.llm 读取）"; FAIL=1
          fi

          if [ $FAIL -eq 1 ]; then
            echo "::error::L5 架构 & 安全 grep 失败，详见 l0-l6-gates.mdc §5.2"
            exit 1
          fi
          echo "✅ L5 架构 & 安全 grep 12 条 PASS"

      # ──────────────────────────────────────────────
      # OpenAPI 契约 lint（BE-FIX-09 · Phase 4 批次 4 接入）
      # 1) check_openapi.py：纯 yaml.safe_load + 关键字段名校验（不依赖 prance）
      # 2) prance（如果 pyproject 声明了则跑；当前未声明 → 跳过）
      # ──────────────────────────────────────────────
      - name: OpenAPI lint — check_openapi.py (BE-FIX-09)
        run: |
          python tools/check_openapi.py --json > /tmp/openapi_check.json
          cat /tmp/openapi_check.json

      - name: OpenAPI lint — prance (optional)
        continue-on-error: true
        run: |
          if uv run python -c "import prance" 2>/dev/null; then
            uv run prance validate docs/architecture/api.yaml --backend=openapi-spec-validator
          else
            echo "prance not installed; skipping (check_openapi.py above covers key field checks)"
          fi

      # ──────────────────────────────────────────────
      # Golden Set 拦截回归
      # ──────────────────────────────────────────────
      - name: Golden Set — input intercept
        run: |
          uv run pytest backend/tests/intercept/ -v

      # ──────────────────────────────────────────────
      # ACK 池合规扫描 (V1.1 合规修复)
      # PRD §3.2 红线 — 每次修改 ack-pool.yaml 必须通过
      # ──────────────────────────────────────────────
      - name: ACK Pool — 合规红线扫描
        run: |
          uv run pytest backend/tests/unit/test_ack_pool_compliance.py -v

      # ──────────────────────────────────────────────
      # 上传 coverage 到 Codecov
      # ──────────────────────────────────────────────
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
        continue-on-error: true