name: backend-ci

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "pyproject.toml"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "pyproject.toml"
      - ".github/workflows/backend-ci.yml"

jobs:
  quality-gates:
    name: L0-L4 质量门禁
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --all-extras

      # ──────────────────────────────────────────────
      # L0：ruff lint
      # ──────────────────────────────────────────────
      - name: L0 — ruff lint
        run: uv run ruff check backend/

      # ──────────────────────────────────────────────
      # L1：ruff format 检查
      # ──────────────────────────────────────────────
      - name: L1 — ruff format check
        run: uv run ruff format --check backend/

      # ──────────────────────────────────────────────
      # L2：mypy strict
      # ──────────────────────────────────────────────
      - name: L2 — mypy strict
        run: uv run mypy backend/ --strict --ignore-missing-imports

      # ──────────────────────────────────────────────
      # L3：pytest（含 Golden Set / Eval Runner）
      # ──────────────────────────────────────────────
      - name: L3 — pytest
        run: |
          uv run pytest backend/tests/ -v \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60

      # ──────────────────────────────────────────────
      # L4：jscpd 代码重复检查（≤ 4%）
      # ──────────────────────────────────────────────
      - name: L4 — jscpd
        run: |
          uv run jscpd backend/ --threshold 4 --reporters console --output /tmp/jscpd || true

      # ──────────────────────────────────────────────
      # OpenAPI 契约 lint（BE-FIX-09 · Phase 4 批次 4 接入）
      # 1) check_openapi.py：纯 yaml.safe_load + 关键字段名校验（不依赖 prance）
      # 2) prance（如果 pyproject 声明了则跑；当前未声明 → 跳过）
      # ──────────────────────────────────────────────
      - name: OpenAPI lint — check_openapi.py (BE-FIX-09)
        run: |
          python tools/check_openapi.py --json > /tmp/openapi_check.json
          cat /tmp/openapi_check.json

      - name: OpenAPI lint — prance (optional)
        continue-on-error: true
        run: |
          if uv run python -c "import prance" 2>/dev/null; then
            uv run prance validate docs/api/openapi.yaml --backend=openapi-spec-validator
          else
            echo "prance not installed; skipping (check_openapi.py above covers key field checks)"
          fi

      # ──────────────────────────────────────────────
      # Golden Set 拦截回归
      # ──────────────────────────────────────────────
      - name: Golden Set — input intercept
        run: |
          uv run pytest backend/tests/intercept/ -v

      # ──────────────────────────────────────────────
      # 上传 coverage 到 Codecov
      # ──────────────────────────────────────────────
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
        continue-on-error: true