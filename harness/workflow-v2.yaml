# Harness V2 state machine; supersedes V1.6 workflow.yaml.
version: "2.0"
deprecates: "workflow.yaml"
initial_phase: REQUIREMENT
# 5 种任务类型定义，每种类型指定不同的 phase 子集
task_types:
  feature:
    description: "完整功能开发"
    phases: [REQUIREMENT, ARCH_DESIGN, PRE_MORTEM, ATDD, PLAN, CODE, DEPLOY, VERIFY, SECURITY_TEST, REGRESSION, SIGN_OFF, DATA_REPLAY, INCIDENT_RESPONSE, OPS_LOOP, SKILL_UPDATE]
    initial_phase: REQUIREMENT
  bugfix:
    description: "Bug 修复"
    phases: [CODE, DEPLOY, VERIFY, SECURITY_TEST, REGRESSION, SIGN_OFF]
    initial_phase: CODE
  refactor:
    description: "代码重构"
    phases: [PLAN, CODE, DEPLOY, VERIFY, SECURITY_TEST, REGRESSION, SIGN_OFF]
    initial_phase: PLAN
  doc-fix:
    description: "文档修复"
    phases: [DOC_FIX, SIGN_OFF]
    initial_phase: DOC_FIX
  perf-optimize:
    description: "性能优化"
    phases: [PLAN, CODE, DEPLOY, VERIFY, SECURITY_TEST, REGRESSION, SIGN_OFF]
    initial_phase: PLAN
interruption_policy:
  budget_per_run: 5
  escalation: "AskUser"
  review_phase: INTERRUPT_REVIEW
  budget_field: interrupt_budget
  replay_field: replay_session_id
# exit_criteria 字段语义：每个 phase 的退出条件是一个 bash 命令数组，
# 命令全部返回 exit code 0（成功）时，phase 视为完成。
# 约定：[cmd1, cmd2, cmd3] 三段式对应：[evidence 文件存在性, frontmatter 关键字段, 内容完整性]
# 一人模式：`auto_mode: true` 时连续运行，跳过 prompt；`false` 时逐 phase 询问用户。
auto_mode_supported: true
one_person_mode:
  enabled: true
  behavior: "跳过 PRE_MORTEM/SIGN_OFF 的 5 reviewer 串行，改为 orchestrator 自动摘要"
phases:
  - id: REQUIREMENT
    next: [ARCH_DESIGN]
    entry_agent: requirement-analyst
    auto_mode: true
    exit_criteria:
      - 'test -f harness/evidence/01-requirement.md'
      - 'grep -q "^signed: true" harness/evidence/01-requirement.md'
      - 'grep -qE "fr_refs:.*FR-[A-Z0-9-]+" harness/evidence/01-requirement.md'
      - 'grep -qE "source_doc:|created_from_scratch:" harness/evidence/01-requirement.md'
    context: harness/context/phase-checklist.md
    interruptible: true
    interrupt_route: INTERRUPT_REVIEW
    evidence_schema: {frontmatter: {phase: REQUIREMENT, run_id: "<uuid>", role: requirement-analyst, fr_refs: [], adr_refs: [], signed: false, interrupt_budget: 5, replay_session_id: "<uuid>", source_doc: null, created_from_scratch: false, source_doc_sections: []}}
  - id: ARCH_DESIGN
    next: [PRE_MORTEM]
    entry_agent: tech-architect
    auto_mode: true
    exit_criteria:
      - 'test -f harness/evidence/02-tech-design.md'
      - 'grep -q "^signed: true" harness/evidence/02-tech-design.md'
      - 'grep -qE "adr_refs:.*ADR-[0-9]" harness/evidence/02-tech-design.md'
      - 'grep -qE "source_sds:|source_tds_modules:|created_tds_modules:|involved_architecture:" harness/evidence/02-tech-design.md'
    context: harness/context/phase-checklist.md
    interruptible: true
    interrupt_route: INTERRUPT_REVIEW
    evidence_schema: {frontmatter: {phase: ARCH_DESIGN, run_id: "<uuid>", role: tech-architect, fr_refs: [], adr_refs: [], signed: false, interrupt_budget: 5, replay_session_id: "<uuid>", source_sds: null, source_tds_modules: [], created_tds_modules: [], new_adrs: [], involved_architecture: [], involved_data: []}}
  - id: PRE_MORTEM
    next: [ATDD]
    entry_agent: requirement-analyst
    auto_mode: true
    one_person_synthesis: true
    dispatch: {mode: serial, reviewers: [requirement-analyst, tech-architect], synthesis_agent: orchestrator, synthesis_evidence: harness/evidence/03-pre-mortem.md, all_reviewers_required: true, one_person_synthesis_enabled: true}
    exit_criteria:
      - 'test -f harness/evidence/03-pre-mortem.md'
      - 'grep -q "^signed: true" harness/evidence/03-pre-mortem.md'
      - 'grep -qE "fr_refs:.*FR-[A-Z0-9-]+" harness/evidence/03-pre-mortem.md'
    context: harness/context/phase-checklist.md
    interruptible: true
    interrupt_route: INTERRUPT_REVIEW
    evidence_schema: {frontmatter: {phase: PRE_MORTEM, run_id: "<uuid>", role: "<reviewer-role>", fr_refs: [], adr_refs: [], signed: false, interrupt_budget: 5, replay_session_id: "<uuid>"}}
  - id: ATDD
    next: [PLAN]
    entry_agent: quality-guardian
    auto_mode: true
    exit_criteria:
      - 'test -f harness/evidence/03-atdd.md'
      - 'grep -q "^signed: true" harness/evidence/03-atdd.md'
      - 'grep -qE "fr_refs:.*FR-[A-Z0-9-]+" harness/evidence/03-atdd.md'
      - 'grep -qE "tds_ref:.*TDS-" harness/evidence/03-atdd.md'
      - 'grep -qE "atdd_docs:" harness/evidence/03-atdd.md'
    context: harness/context/phase-checklist.md
    interruptible: true
    interrupt_route: INTERRUPT_REVIEW
    evidence_schema: {frontmatter: {phase: ATDD, run_id: "<uuid>", role: quality-guardian, fr_refs: [], adr_refs: [], signed: false, interrupt_budget: 5, replay_session_id: "<uuid>", tds_ref: null, atdd_docs: []}}
  - id: PLAN
    next: [CODE]
    entry_agent: plan-generator
    auto_mode: true
    exit_criteria:
      - 'test -f harness/evidence/05-plan.md'
      - 'grep -q "^signed: true" harness/evidence/05-plan.md'
      - 'grep -qE "fr_refs:.*FR-[A-Z0-9-]+" harness/evidence/05-plan.md'
    context: harness/context/phase-checklist.md
    interruptible: true
    interrupt_route: INTERRUPT_REVIEW
    evidence_schema: {frontmatter: {phase: PLAN, run_id: "<uuid>", role: plan-generator, fr_refs: [], adr_refs: [], signed: false, interrupt_budget: 5, replay_session_id: "<uuid>"}}
  - id: CODE
    next: [DEPLOY]
    entry_agent: developer
    auto_mode: true
    exit_criteria:
      - 'test -f harness/evidence/06-code.md'
      - 'grep -q "^signed: true" harness/evidence/06-code.md'
      - 'cd backend && uv run pytest tests/unit -x -q --tb=no >/dev/null 2>&1'
    context: harness/context/phase-checklist.md
    interruptible: true
    interrupt_route: INTERRUPT_REVIEW
    evidence_schema: {frontmatter: {phase: CODE, run_id: "<uuid>", role: developer, fr_refs: [], adr_refs: [], signed: false, interrupt_budget: 5, replay_session_id: "<uuid>"}}
  - id: DEPLOY
    next: [VERIFY]
    entry_agent: deployer
    auto_mode: true
    exit_criteria:
      - 'test -f harness/evidence/09-deploy.md'
      - 'grep -q "^signed: true" harness/evidence/09-deploy.md'
      - 'grep -qE "(deploy.*success|部署成功|skipped|跳过)" harness/evidence/09-deploy.md'
    context: harness/context/phase-checklist.md
    interruptible: true
    interrupt_route: INTERRUPT_REVIEW
    evidence_schema: {frontmatter: {phase: DEPLOY, run_id: "<uuid>", role: deployer, fr_refs: [], adr_refs: [], signed: false, interrupt_budget: 5, replay_session_id: "<uuid>"}}
  - id: VERIFY
    next: [REGRESSION]
    entry_agent: verifier
    auto_mode: true
    exit_criteria:
      - 'test -f harness/evidence/07-verify.md'
      - 'grep -q "^signed: true" harness/evidence/07-verify.md'
      - 'grep -qE "(L0|L1|L3).*PASS|ruff.*pass|pytest.*pass" harness/evidence/07-verify.md'
    context: harness/context/phase-checklist.md
    interruptible: true
    interrupt_route: INTERRUPT_REVIEW
    evidence_schema: {frontmatter: {phase: VERIFY, run_id: "<uuid>", role: verifier, fr_refs: [], adr_refs: [], signed: false, interrupt_budget: 5, replay_session_id: "<uuid>"}}
  - id: SECURITY_TEST
    next: [REGRESSION]
    entry_agent: security-reviewer
    auto_mode: true
    parallel_with: [VERIFY]
    exit_criteria:
      - 'test -f harness/evidence/08-security-test.md'
      - 'grep -q "^signed: true" harness/evidence/08-security-test.md'
      - 'cd backend && uv run ruff check . --select=S,SEC,B >/dev/null 2>&1'
    context: harness/context/phase-checklist.md
    interruptible: true
    interrupt_route: INTERRUPT_REVIEW
    evidence_schema: {frontmatter: {phase: SECURITY_TEST, run_id: "<uuid>", role: security-reviewer, fr_refs: [], adr_refs: [], signed: false, interrupt_budget: 5, replay_session_id: "<uuid>"}}
  - id: DOC_FIX
    next: [SIGN_OFF]
    entry_agent: developer
    auto_mode: true
    exit_criteria:
      - 'test -f harness/evidence/17-doc-fix.md'
      - 'grep -q "^signed: true" harness/evidence/17-doc-fix.md'
      - 'grep -qE "(markdownlint|typos|ruff.*format|broken-link|格式检查.*PASS)" harness/evidence/17-doc-fix.md'
    context: harness/context/phase-checklist.md
    interruptible: true
    interrupt_route: INTERRUPT_REVIEW
    evidence_schema: {frontmatter: {phase: DOC_FIX, run_id: "<uuid>", role: developer, fr_refs: [], adr_refs: [], signed: false, interrupt_budget: 5, replay_session_id: "<uuid>"}}
  - id: REGRESSION
    next: [SIGN_OFF]
    entry_agent: tester
    auto_mode: true
    exit_criteria:
      - 'test -f harness/evidence/10-regression.md'
      - 'grep -q "^signed: true" harness/evidence/10-regression.md'
      - 'cd backend && uv run pytest tests/integration -x -q --tb=no >/dev/null 2>&1'
    context: harness/context/phase-checklist.md
    interruptible: true
    interrupt_route: INTERRUPT_REVIEW
    evidence_schema: {frontmatter: {phase: REGRESSION, run_id: "<uuid>", role: tester, fr_refs: [], adr_refs: [], signed: false, interrupt_budget: 5, replay_session_id: "<uuid>"}}
  - id: SIGN_OFF
    next: [INCIDENT_RESPONSE]
    entry_agent: requirement-analyst
    auto_mode: true
    one_person_synthesis: true
    dispatch: {mode: serial, reviewers: [requirement-analyst, tech-architect], synthesis_agent: orchestrator, synthesis_evidence: harness/evidence/11-signoff.md, all_reviewers_required: true, one_person_synthesis_enabled: true}
    exit_criteria:
      - 'test -f harness/evidence/11-signoff.md'
      - 'grep -q "^signed: true" harness/evidence/11-signoff.md'
      - 'grep -qE "fr_refs:.*FR-[A-Z0-9-]+" harness/evidence/11-signoff.md'
    context: harness/context/phase-checklist.md
    interruptible: true
    interrupt_route: INTERRUPT_REVIEW
    evidence_schema: {frontmatter: {phase: SIGN_OFF, run_id: "<uuid>", role: "<reviewer-role>", fr_refs: [], adr_refs: [], signed: false, interrupt_budget: 5, replay_session_id: "<uuid>"}}
  - id: DATA_REPLAY
    next: [REQUIREMENT]
    entry_agent: requirement-analyst
    auto_mode: true
    exit_criteria:
      - 'test -f harness/evidence/12-data-replay.md'
      - 'grep -qE "replay_session_id: [a-f0-9-]{36}" harness/evidence/12-data-replay.md'
      - 'grep -qE "fr_refs:.*FR-[A-Z0-9-]+" harness/evidence/12-data-replay.md'
    context: harness/context/phase-checklist.md
    interruptible: true
    interrupt_route: INTERRUPT_REVIEW
    evidence_schema: {frontmatter: {phase: DATA_REPLAY, run_id: "<uuid>", role: requirement-analyst, fr_refs: [], adr_refs: [], signed: false, interrupt_budget: 5, replay_session_id: "<uuid>"}}
  - id: INCIDENT_RESPONSE
    next: [OPS_LOOP]
    entry_agent: deployer
    auto_mode: true
    exit_criteria:
      - 'test -f harness/evidence/13-incident-response.md'
      - 'grep -q "^signed: true" harness/evidence/13-incident-response.md'
      - 'grep -qE "(fr_refs|incident_id).*FR-|INC-" harness/evidence/13-incident-response.md'
    context: harness/context/phase-checklist.md
    interruptible: true
    interrupt_route: INTERRUPT_REVIEW
    evidence_schema: {frontmatter: {phase: INCIDENT_RESPONSE, run_id: "<uuid>", role: deployer, fr_refs: [], adr_refs: [], signed: false, interrupt_budget: 5, replay_session_id: "<uuid>"}}
  - id: OPS_LOOP
    next: [SKILL_UPDATE]
    entry_agent: tester
    auto_mode: true
    exit_criteria:
      - 'test -f harness/evidence/14-ops-loop.md'
      - 'grep -q "^signed: true" harness/evidence/14-ops-loop.md'
      - 'grep -qE "(A/B|灰度|gradual)" harness/evidence/14-ops-loop.md'
    context: harness/context/phase-checklist.md
    interruptible: true
    interrupt_route: INTERRUPT_REVIEW
    evidence_schema: {frontmatter: {phase: OPS_LOOP, run_id: "<uuid>", role: tester, fr_refs: [], adr_refs: [], signed: false, interrupt_budget: 5, replay_session_id: "<uuid>"}}
  - id: SKILL_UPDATE
    next: [INTERRUPT_REVIEW]
    entry_agent: quality-guardian
    auto_mode: true
    exit_criteria:
      - 'test -f harness/evidence/15-skill-update.md'
      - 'grep -q "^signed: true" harness/evidence/15-skill-update.md'
      - 'ls harness/lessons/ | wc -l | grep -qE "[1-9]"'
    context: harness/context/phase-checklist.md
    interruptible: true
    interrupt_route: INTERRUPT_REVIEW
    evidence_schema: {frontmatter: {phase: SKILL_UPDATE, run_id: "<uuid>", role: quality-guardian, fr_refs: [], adr_refs: [], signed: false, interrupt_budget: 5, replay_session_id: "<uuid>"}}
  - id: INTERRUPT_REVIEW
    next: null
    entry_agent: quality-guardian
    resume_from: "$interrupted_phase"
    auto_mode: true
    exit_criteria:
      - 'test -f harness/evidence/16-interrupt-review.md'
      - 'grep -q "^signed: true" harness/evidence/16-interrupt-review.md'
      - 'grep -qE "(resume|continue|推迟|defer)" harness/evidence/16-interrupt-review.md'
    context: harness/context/phase-checklist.md
    interruptible: false
    evidence_schema: {frontmatter: {phase: INTERRUPT_REVIEW, run_id: "<uuid>", role: quality-guardian, fr_refs: [], adr_refs: [], signed: false, interrupt_budget: 5, replay_session_id: "<uuid>"}}
