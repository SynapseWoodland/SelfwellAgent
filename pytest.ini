[pytest]
testpaths = backend
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Golden Set 必须全部通过，不允许 xfail
xfail_strict = true

addopts =
    --strict-markers
    --tb=short
    -v

markers =
    golden_set: Golden Set 合规测试 case
    input_test: 输入拦截测试
    output_test: 输出检测测试
    critical: 必须被拦截的严重违规 case
    benign: 合规通过的 case
    load: Locust 性能 / 负载测试场景
    e2e: 端到端 API 层测试（httpx + ASGI）
    bdd: BDD 行为驱动测试（given-when-then）
