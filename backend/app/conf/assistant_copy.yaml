# §二 基线问候（PRD §3.5.4，按 last_feedback_days_ago 段位）
# 字段：title + subtitle
baseline_greeting:
  never_recorded:
    title: "嗨，今天想聊点什么？"
    subtitle: "从一张照片或一句心里话开始都行。"
  recorded_today:
    title: "嗨，今天我在这儿。"
    subtitle: "你刚记录过了，要是还想继续聊，我在。"
  recent_within_a_week:
    title: "嗨，又见面了。"
    subtitle: "想继续聊上次的话题，还是换个方向？"
  inactive_7d_or_more:
    title: "嗨，你回来啦。"
    subtitle: "什么时候回来都行，我在。"

