  - "checkin.count"
  - "focus_parts.diff"
  - "photos.before_after_compare"

# ─────────────────────────────────────────────────────────────────
# §6 安全兜底文案（Layer 3 fallback pool）
# ─────────────────────────────────────────────────────────────────
safe_fallback_summary: "你过去记录过这些话，我读了一遍，都是真诚的。今天的你也一样。"
safe_fallback_summary_pool:
  - "你过去记录过这些话，我读了一遍，都是真诚的。"
  - "我看到你过去的样子——那时的你也在慢慢来。"
  - "那时候的你，也有自己的步调。"

safe_fallback_encourage: "你已经在路上了，这就是答案。"
safe_fallback_encourage_pool:
  - "走到的今天，你已经在这里了。"
  - "每一步都是你自己的。"
  - "今天和过去的你，都算数。"
