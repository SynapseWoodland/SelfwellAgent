# Recall Safety Forbidden Keywords — ADR-0017 §3.3
# ─────────────────────────────────────────────────────────────────
# 真源：docs/architecture/adr/0017-recall-safety.md §3.3 三层 Safety 架构
# 设计意图：LLM 输出在送往前端前必须经过此词库扫描，命中 → 安全兜底文案替换
#
# ★ 4 分组目标命中数：
#   - before_after_judge   40+  前后评判
#   - effect_commit        30+  效果承诺
#   - numeric_judge        20+  数字评判
#   - appearance_judge     10+  评判气质
#
# ★ 永不复用清单（ADR-0017 §3.5）：
#   - checkin.count（坚持 X 天）
#   - focus_parts.diff
#   - photos.before_after_compare

version: "1.1.1"
source: "docs/architecture/adr/0017-recall-safety.md §3.3"

