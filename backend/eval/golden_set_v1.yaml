# ============================================================
# 约束（设计阶段）
# 1. 业务路由回归：用自然语言问句 → 期望路由 / 拦截状态
# 2. 沿用拦截回归编号 G-*（不混入 yaml，yaml 仅承载 GN-* 跨调用拦截 / 业务路径）
# 3. real_data_anchors 必须引用项目内真实路径或 MCP 枚举
# 4. confidence_min：低于该值视为回归
# 5. v4.1-prep 子任务 2 新增：三层渐进式组织
#    - L1-baseline      ：原 21 条 v1 用例（已稳定）
#    - L2-vision-chat   ：11 条 V4.1 新增用例（VISION/CHAT/CROSS，status=draft）
#    - L3-error-contract：8 条 E_CODE 原子契约用例（GN-ERR-001~008）
# 6. L2 用例的 expected.route / expected.code 字段若 V4.1 主方案未给出
#    完整内容，统一以 `<TODO: from V4.1 Step X.Y>` 占位，禁止编造
# ============================================================

metadata:
  total_cases: 40     # 21 L1-baseline + 11 L2-vision-chat + 8 L3-error-contract
  schema_version: "v2.0.0-three-layer"
  layer_breakdown:
    L1-baseline: 21
    L2-vision-chat: 11
    L3-error-contract: 8
  # LLM 配置（代码真值，非声明值）
  # 线上默认（本项目占位：实际 LLM 待定）
  llm_model: "本项目默认 LLM（待定）"
  llm_base_url: "待定"
  # PR-D 评测校准用的模型（非默认）
  llm_eval_experiment: "实验对比模型（待定）"
  # Redis 命名空间（本项目占位）
  redis_namespaces:
    - key: "selfwell:cache:"
      owner: "本项目 cache 模块（待定）"
      purpose: "业务路由最终结果缓存"
      ttl_seconds: 1800
    - key: "selfwell:intent_cache:"
      owner: "本项目 intent_node（待定）"
      purpose: "意图分类结果缓存"
      ttl_seconds: 120
  # Qdrant collection（本项目占位）
  qdrant_collections:
    - key: "health_topic_collection"
      owner: "本项目 topic_repository（待定）"
      purpose: "健康话题向量检索"
    - key: "encourage_script_collection"
      owner: "本项目 script_repository（待定）"
      purpose: "督促话术向量检索"
  tier2_confidence_threshold: 0.7

