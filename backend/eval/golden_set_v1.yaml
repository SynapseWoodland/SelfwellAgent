# ============================================================
# 约束（设计阶段）
# 1. 业务路由回归：用自然语言问句 → 期望路由 / 拦截状态
# 2. 沿用拦截回归编号 G-*（不混入 yaml，yaml 仅承载 GN-* 跨调用拦截 / 业务路径）
# 3. real_data_anchors 必须引用项目内真实路径或 MCP 枚举
# 4. confidence_min：低于该值视为回归
# ============================================================

metadata:
  total_cases: 21     # 3 占位 + M5×6 + M7×6 + M8×6
  schema_version: "v1.0.0"
  # LLM 配置（代码真值，非声明值）
  # 线上默认（本项目占位：实际 LLM 待定）
  llm_model: "本项目默认 LLM（待定）"
  llm_base_url: "待定"
  # PR-D 评测校准用的模型（非默认）
  llm_eval_experiment: "实验对比模型（待定）"
  # Redis 命名空间（本项目占位）
  redis_namespaces:
    - key: "selfwell:cache:"
      owner: "本项目 cache 模块（待定）"
      purpose: "业务路由最终结果缓存"
      ttl_seconds: 1800
    - key: "selfwell:intent_cache:"
      owner: "本项目 intent_node（待定）"
      purpose: "意图分类结果缓存"
      ttl_seconds: 120
