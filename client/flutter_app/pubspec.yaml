name: selfwell_app
description: "Selfwell 自愈 · Flutter APP 客户端（M1-M11 MVP，iOS 优先，HarmonyOS P1 扩展）"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 网络层
  dio: ^5.7.0
  http: ^1.2.2

  # 状态管理
  provider: ^6.1.2
  riverpod: ^2.5.1

  # 路由
  go_router: ^14.2.7

  # 存储
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 推送
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  # 微信登录 / 分享
  fluwx: ^4.7.2

  # UI 工具
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10
  # 海报分享（生成 / 保存 / 分享）
  share_plus: ^10.0.2
  path_provider: ^2.1.4

  # 国际化
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true