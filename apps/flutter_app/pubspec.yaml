name: selfwell_app
description: Selfwell AI Health Companion - Flutter APP (iOS P0, V1.3)
version: 0.1.0+1
publish_to: 'none'

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # HTTP
  dio: ^5.7.0

  # Storage
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Formatting / i18n
  intl: ^0.19.0

  # Push notifications (FCM + APNs bridge on iOS)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Icons
  lucide_icons_flutter: ^0.4.0

  # Code generation support
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true
  assets:
    - assets/